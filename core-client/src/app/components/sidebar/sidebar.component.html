<!-- sidebar.component.html -->
<div class="sidebar-container" [class.collapsed]="isCollapsed">
  <!-- Sidebar Header with Toggle -->
  <div class="sidebar-header">
    <div class="flex items-center justify-between">
      <div class="flex items-center space-x-3" [class.hidden]="isCollapsed">
        <div class="logo-wrapper">
          <div class="logo-gradient">
            <span class="text-white font-bold text-lg">💰</span>
          </div>
        </div>
        <div>
          <h2 class="text-lg font-bold app-title">InvoiceFlow</h2>
          <p class="text-xs text-purple-200">Professional Invoicing</p>
        </div>
      </div>
      <div *ngIf="isCollapsed" class="logo-wrapper mx-auto">
        <div class="logo-gradient">
          <span class="text-white font-bold text-sm">💰</span>
        </div>
      </div>
      <button 
        class="toggle-btn" 
        (click)="toggleSidebar()"
        [attr.aria-label]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
      >
        <i class="fas" [ngClass]="isCollapsed ? 'fa-chevron-right' : 'fa-chevron-left'"></i>
      </button>
    </div>
  </div>

  <!-- User Profile Section - Enhanced -->
  <div class="user-profile-wrapper" *ngIf="user">
    <div class="user-profile" [class.justify-center]="isCollapsed">
      <div class="avatar-container">
        <div class="avatar-gradient">
          <span class="avatar-text">{{ getInitials(user.fullName) }}</span>
        </div>
        <div class="status-indicator"></div>
      </div>
      <div class="user-info" [class.hidden]="isCollapsed">
        <h3 class="user-name" [title]="user.fullName">{{ user.fullName }}</h3>
        <p class="user-role">{{ getUserRole(user.roles) }}</p>
      </div>
    </div>
  </div>

  <!-- Navigation Menu with Tooltips -->
  <nav class="sidebar-nav">
    <div class="nav-section" *ngIf="!isCollapsed">
      <p class="nav-section-title">MAIN</p>
    </div>
    
    <div
      *ngFor="let item of menuItems"
      class="nav-item-wrapper"
      [class.active]="item.active"
      [class.has-submenu]="item.hasSubmenu"
      [class.submenu-open]="item.submenuOpen"
    >
      <div
        class="nav-item"
        [class.active]="item.active"
        [class.collapsed]="isCollapsed"
        (click)="onMenuItemClick(item)"
        [attr.data-tooltip]="isCollapsed ? item.label : null"
      >
        <div class="nav-item-content">
          <i [class]="item.icon" class="nav-icon"></i>
          <span class="nav-label" [class.hidden]="isCollapsed">{{ item.label }}</span>
        </div>
        
        <div class="nav-item-indicators" *ngIf="!isCollapsed">
          <div *ngIf="item.label === 'Dashboard'" class="active-dot"></div>
          <i
            *ngIf="item.hasSubmenu"
            class="fas fa-chevron-down submenu-arrow"
            [class.rotated]="item.submenuOpen"
          ></i>
        </div>
      </div>

      <!-- Submenu with Animation -->
      <div
        *ngIf="item.hasSubmenu && item.submenuOpen && !isCollapsed"
        class="submenu-container"
        @slideIn
      >
        <div
          *ngFor="let subItem of item.subItems"
          class="submenu-item"
          [class.active]="subItem.active"
          (click)="onMenuItemClick(subItem)"
        >
          <i [class]="subItem.icon" class="submenu-icon"></i>
          <span class="submenu-label">{{ subItem.label }}</span>
          <div *ngIf="subItem.active" class="active-indicator"></div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Bottom Actions -->
  <div class="sidebar-footer">
    <div class="footer-actions">
      <button 
        class="footer-btn" 
        [class.justify-center]="isCollapsed"
        (click)="logout()"
        [attr.data-tooltip]="isCollapsed ? 'Logout' : null"
      >
        <i class="fas fa-sign-out-alt footer-icon"></i>
        <span class="footer-label" [class.hidden]="isCollapsed">Logout</span>
      </button>
      
      <button 
        class="footer-btn theme-btn"
        [class.justify-center]="isCollapsed"
        (click)="toggleTheme()"
        [attr.data-tooltip]="isCollapsed ? 'Toggle theme' : null"
      >
        <i class="fas fa-moon footer-icon"></i>
        <span class="footer-label" [class.hidden]="isCollapsed">Dark mode</span>
      </button>
    </div>
    
    <div class="app-version" *ngIf="!isCollapsed">
      <span>v2.1.0</span>
    </div>
  </div>
</div>
