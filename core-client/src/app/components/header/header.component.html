<!-- header.component.html - Updated with responsive structure -->
<header>
  <div class="header-container">
    <!-- Left Section -->
    <div class="header-left">
      <button 
        class="mobile-menu-btn"
        (click)="onToggleSidebar()"
        aria-label="Toggle sidebar"
      >
        <i class="fas fa-bars"></i>
      </button>
      
      <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input
          type="text"
          class="search-input"
          placeholder="Search projects, invoices, customers..."
          [(ngModel)]="searchQuery"
        />
      </div>
    </div>

    <!-- Right Section -->
    <div class="header-right">
      <div class="header-actions">
        <!-- Messages -->
        <button 
          class="action-btn"
          aria-label="Messages"
          title="Messages"
        >
          <i class="fas fa-envelope"></i>
        </button>

        <!-- Notifications -->
        <div class="relative">
          <button 
            class="action-btn"
            (click)="toggleNotificationDropdown()"
            aria-label="Notifications"
            [attr.aria-expanded]="isNotificationDropdownOpen"
          >
            <i class="fas fa-bell"></i>
            <span 
              *ngIf="hasNotifications" 
              class="notification-badge"
            >
              {{ unreadCount > 9 ? '9+' : unreadCount }}
            </span>
          </button>

          <!-- Notification Dropdown -->
          <div 
            *ngIf="isNotificationDropdownOpen"
            class="notification-dropdown"
          >
            <div class="dropdown-header">
              <h3>Notifications</h3>
              <button 
                *ngIf="notifications.length > 0"
                class="clear-btn"
                (click)="clearNotifications()"
              >
                Clear All
              </button>
            </div>
            
            <div class="dropdown-content">
              <div 
                *ngIf="notifications.length === 0"
                class="notification-empty"
              >
                No notifications
              </div>
              
              <div 
                *ngFor="let notification of notifications"
                class="dropdown-item"
                [class.unread]="!notification.read"
                (click)="viewInvoice(notification)"
              >
                <div class="notification-icon">
                  <i class="fas fa-file-invoice"></i>
                </div>
                <div class="notification-content">
                  <p class="notification-message">{{ notification.message }}</p>
                  <p class="notification-time">
                    {{ notification.timestamp | date:'MMM d, h:mm a' }}
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Help -->
        <button 
          class="action-btn"
          aria-label="Help"
          title="Help"
        >
          <i class="fas fa-question-circle"></i>
        </button>
      </div>

      <!-- User Menu -->
      <div class="user-menu" [class.open]="isDropdownOpen">
        <button 
          class="user-menu-btn"
          (click)="toggleDropdown()"
          aria-label="User menu"
        >
          <img 
            [src]="userAvatar" 
            [alt]="userName"
            class="user-avatar"
            onerror="this.src='assets/default-avatar.png'"
          >
          <span class="user-name">{{ userName }}</span>
          <i class="fas fa-chevron-down dropdown-icon"></i>
        </button>

        <!-- User Dropdown -->
        <div *ngIf="isDropdownOpen" class="dropdown-menu">
          <button class="dropdown-menu-item">
            <i class="fas fa-user"></i>
            Profile
          </button>
          <button class="dropdown-menu-item">
            <i class="fas fa-cog"></i>
            Settings
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-menu-item" (click)="logout()">
            <i class="fas fa-sign-out-alt"></i>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
