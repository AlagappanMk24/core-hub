<!-- layout.component.html -->
<div class="layout-container" [class.sidebar-collapsed]="isSidebarCollapsed">
  <!-- Sidebar -->
  <app-sidebar
    [isCollapsed]="isSidebarCollapsed"
    [class.mobile-open]="!isSidebarCollapsed && isMobileView"
    (collapsedChange)="onSidebarCollapsed($event)"
  ></app-sidebar>

  <!-- Main Content Area -->
  <div class="main-content" [class.expanded]="isSidebarCollapsed">
    <!-- Header -->
    <app-header
      [userName]="currentUser.name"
      [userAvatar]="currentUser.avatar"
      [isSidebarCollapsed]="isSidebarCollapsed"
      (toggleSidebar)="toggleSidebar()"
      (themeChanged)="onThemeChanged($event)"
    >
    </app-header>

    <!-- Dynamic Content Area -->
    <main class="content-area">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>

<!-- Mobile Sidebar Overlay -->
<div
  class="mobile-overlay"
  [class.show]="!isSidebarCollapsed && isMobileView"
  (click)="toggleSidebar()"
></div>
