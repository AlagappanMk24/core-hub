<div class="min-h-screen bg-gray-100">

    <app-admin-dashboard-stats *ngSwitchCase="'admin'"></app-admin-dashboard-stats>
    <app-user-dashboard-stats *ngSwitchCase="'user'"></app-user-dashboard-stats>
    <app-customer-dashboard-stats *ngSwitchCase="'customer'"></app-customer-dashboard-stats>
  </ng-container>
</div>
